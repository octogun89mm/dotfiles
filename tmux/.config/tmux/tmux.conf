# -- General --
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on

# -- Prefix --
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- Splits --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# -- Pane navigation (vim-style) --
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Pane resizing --
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- Window movement --
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# -- Copy mode (vi) --
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# -- Status bar --
set -g status-position top
set -g status-interval 5
set -g status-style 'bg=default,fg=color7'
set -g status-left '#[bold]#S #[default]'
set -g status-left-length 20
set -g status-right '%I:%M %p'
set -g status-right-length 10

# Single-line bar: session + windows on left, random tip in middle, clock on right
set -g status-format[0] "#[align=left]#[push-default]#{T:status-left}#[pop-default]#{W:#[fg=color7] #I:#W ,#[bold,fg=color0,bg=color10] #I:#W }#[align=centre,fg=color8,bg=default,nobold,italics]TIP: #(bash /home/juju/.config/tmux/tips.sh)#[noitalics,default]#[align=right]#[push-default]#{T:status-right}#[pop-default]"

# Window status
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[bold,fg=color0,bg=color10] #I:#W '
setw -g window-status-separator ''

# -- Pane borders --
set -g pane-border-style 'fg=color8'
set -g pane-active-border-style 'fg=color10'

# -- Messages --
set -g message-style 'fg=color0,bg=color3,bold'

# -- Reload config --
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# -- Plugins --
set -g @plugin 'tmux-plugins/tpm'

# Initialize TPM (keep at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
