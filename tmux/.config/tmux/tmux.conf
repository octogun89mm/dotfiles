# -- General --
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 100000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -sg escape-time 0
set -g focus-events on

# -- Prefix --
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- Splits --
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# -- Pane navigation (vim-style) --
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Pane resizing --
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- Window movement --
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# -- Copy mode (vi) --
setw -g mode-keys vi
bind v copy-mode
bind PageUp copy-mode -u
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi PageUp send -X page-up
bind -T copy-mode-vi PageDown send -X page-down

# -- Status bar --
set -g status-position top
set -g status-interval 5
set -g @prefix-status-normal 'bg=default fg=color7'
set -g @prefix-status-active 'bg=color3 fg=color0'
set -g @prefix-status-badge ' 󰆾 '
set -g @status-sep-left ''
set -g @status-sep-right ''
set -g status-style '#{?client_prefix,#{@prefix-status-active},#{@prefix-status-normal}}'
set -g status-left '#{?client_prefix,#[fg=color3]#[bg=default]#{@status-sep-left}#[fg=color0]#[bg=color3]#[bold]#{@prefix-status-badge}#[fg=color3]#[bg=default]#{@status-sep-right} ,}#[fg=color10]#[bg=default]#{@status-sep-left}#[fg=color0]#[bg=color10]#[bold] #S #[fg=color10]#[bg=default]#{@status-sep-right}'
set -g status-left-length 40
set -g status-right '#[fg=color10]#[bg=default]#{@status-sep-left}#[fg=color0]#[bg=color10]#[bold] #H #[fg=color10]#[bg=default]#{@status-sep-right}'
set -g status-right-length 30

# Single-line bar: session + windows on left, random tip in middle, clock on right
set -g status-format[0] "#[align=left]#[push-default]#{T:status-left}#[pop-default]#{W:#[default]#[fg=#{?client_prefix,color0,color15}] #I:#W ,#[default]#[fg=color10]#[bg=default]#{@status-sep-left}#[fg=#{?client_prefix,color8,color0}]#[bg=color10]#[bold] #I:#W #[fg=color10]#[bg=default]#{@status-sep-right}}#[align=centre]#[default]#[fg=color8]#[italics]#{?client_prefix, 󰆾 KEYS: | - c h/j/k/l H/J/K/L r,TIP: #(bash ~/.config/tmux/tips.sh)}#[noitalics]#[default]#[align=right]#[push-default]#{T:status-right}#[pop-default]"

# Window status
setw -g window-status-format '#[default]#[fg=color7]#[bg=default] #I:#W '
setw -g window-status-current-format '#[default]#[fg=color10]#[bg=default]#[bold]  #I:#W '
setw -g window-status-separator ''

# -- Pane borders --
set -g pane-border-style 'fg=color8'
set -g pane-active-border-style 'fg=color10'

# -- Messages --
set -g message-style 'fg=color0,bg=color3,bold'

# -- Reload config --
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# -- Plugins --
set -g @plugin 'tmux-plugins/tpm'

# Initialize TPM (keep at the very bottom)
if-shell '[ -x ~/.config/tmux/plugins/tpm/tpm ]' 'run ~/.config/tmux/plugins/tpm/tpm'
