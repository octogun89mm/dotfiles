source = ~/.config/hypr/themes/wallust-lock.conf

general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 320, 55
    position = 0, -120
    halign = center
    valign = center
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.35
    dots_center = true
    fade_on_empty = true
    rounding = 0
    inner_color = $background
    outer_color = $accent
    check_color = $accent2
    fail_color = $error
    font_color = $foreground
    placeholder_text = <i>Password...</i>
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 96
    font_family = Iosevka
    color = $foreground
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %-d')"
    font_size = 20
    font_family = Iosevka
    color = $muted
    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    font_size = 14
    font_family = Iosevka
    color = $accent
    position = 0, -40
    halign = center
    valign = center
}
